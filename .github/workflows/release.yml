name: Build and Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Имя тега релиза (например, 1.4.5)'
        required: true
        default: '1.4.5'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
      AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Run version update script
      shell: powershell
      run: |
        # Get version from input or tag
        $tagName = "${{ github.event.inputs.tag_name }}"
        if ([string]::IsNullOrEmpty($tagName)) {
            $tagName = $env:GITHUB_REF_NAME
        }
        $tagName = $tagName -replace '^refs/tags/', ''
        # Update manifests and updates.json
        node update-versions.js $tagName

    - name: Run extension build script
      run: node build.js

    - name: Pack Chrome extension
      shell: powershell
      run: |
        Compress-Archive -Path dist/chrome/* -DestinationPath DAModerator-chrome.zip

    - name: Pack Firefox extension
      shell: powershell
      run: |
        Compress-Archive -Path dist/firefox/* -DestinationPath DAModerator-firefox.zip
        Rename-Item -Path DAModerator-firefox.zip -NewName DAModerator-firefox.xpi

    - name: Sign Firefox extension with Web-Ext (Mozilla AMO)
      if: env.AMO_JWT_ISSUER != '' && env.AMO_JWT_SECRET != ''
      shell: powershell
      run: |
        # Run web-ext sign inside cmd to prevent PowerShell NativeCommandError on stderr redirect
        cmd /c "npx web-ext sign --source-dir dist/firefox --api-key %AMO_JWT_ISSUER% --api-secret %AMO_JWT_SECRET% --channel unlisted > web-ext-log.txt 2>&1"
        $exitCode = $LASTEXITCODE
        
        # Display the log contents in the console
        if (Test-Path web-ext-log.txt) {
            Get-Content web-ext-log.txt
        }
        
        if ($exitCode -ne 0) {
            $logContent = ""
            if (Test-Path web-ext-log.txt) {
                $logContent = Get-Content web-ext-log.txt -Raw
            }
            
            # Only fallback if the error is a version conflict/already exists
            if ($logContent -match "already exists" -or $logContent -match "Conflict") {
                Write-Host "Warning: Version already exists on Mozilla AMO. Attempting to download the already signed XPI..."
                
                # Determine tag name
                $tagName = "${{ github.event.inputs.tag_name }}"
                if ([string]::IsNullOrEmpty($tagName)) {
                    $tagName = $env:GITHUB_REF_NAME
                }
                $tagName = $tagName -replace '^refs/tags/', ''
                
                # Run download script
                node download-signed.js $tagName DAModerator-firefox.xpi
                if ($LASTEXITCODE -ne 0) {
                    Write-Error "Failed to download the already signed Firefox extension from Mozilla AMO."
                    exit 1
                }
            } else {
                Write-Error "web-ext sign failed with a non-conflict error."
                exit 1
            }
        } else {
            # Find signed file and replace DAModerator-firefox.xpi
            $signedFile = Get-ChildItem -Path web-ext-artifacts\*.xpi | Select-Object -First 1
            if ($signedFile) {
                Copy-Item -Path $signedFile.FullName -Destination DAModerator-firefox.xpi -Force
                Write-Host "Firefox extension successfully signed via AMO and copied to DAModerator-firefox.xpi"
            } else {
                Write-Error "Signed file not found in web-ext-artifacts"
                exit 1
            }
        }


    - name: Download and Setup AutoHotkey Compiler
      shell: powershell
      run: |
        # Download official AutoHotkey portable package from GitHub to bypass Cloudflare
        Invoke-WebRequest -Uri "https://github.com/AutoHotkey/AutoHotkey/releases/download/v1.1.37.02/AutoHotkey_1.1.37.02.zip" -OutFile "ahk.zip"
        Expand-Archive -Path "ahk.zip" -DestinationPath "AhkCompiler"


    - name: Compile Universal AHK Script to EXE
      shell: powershell
      run: |
        # Resolve absolute paths for compiler, inputs, outputs, and base files
        $compilerPath = (Resolve-Path "AhkCompiler\Compiler\Ahk2Exe.exe").Path
        $inPath = (Resolve-Path "AHK/DAModerator.ahk").Path
        $outPath = "$pwd\DAModerator.exe"
        $iconPath = (Resolve-Path "AHK/icon.ico").Path
        $binPath = (Resolve-Path "AhkCompiler\Compiler\Unicode 32-bit.bin").Path
        
        # Compile script
        Start-Process -FilePath $compilerPath -ArgumentList "/in `"$inPath`" /out `"$outPath`" /icon `"$iconPath`" /bin `"$binPath`"" -Wait -NoNewWindow
        
        # Verify if executable was created
        if (Test-Path "DAModerator.exe") {
            Write-Host "✅ Universal AHK script successfully compiled to DAModerator.exe!"
        } else {
            Write-Error "❌ Compilation failed: DAModerator.exe was not created."
            exit 1
        }

    - name: Create GitHub Release and Upload Assets
      shell: powershell
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Force UTF-8 encoding for console output and commands to prevent Cyrillic encoding issues
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $OutputEncoding = [System.Text.Encoding]::UTF8

        # Определяем имя тега: либо из события push, либо из инпута workflow_dispatch
        $tagName = "${{ github.event.inputs.tag_name }}"
        if ([string]::IsNullOrEmpty($tagName)) {
            $tagName = $env:GITHUB_REF_NAME
        }
        $tagName = $tagName -replace '^refs/tags/', ''

        # Используем GitHub CLI для создания релиза и загрузки 4 файлов
        gh release create $tagName DAModerator-chrome.zip DAModerator-firefox.xpi AHK/DAModerator.ahk DAModerator.exe `
          --title "$tagName" `
          --notes "Автоматический релиз версии $tagName. Содержит готовые расширения для Chrome/Firefox и универсальный AHK-скрипт."

    - name: Commit and push version updates to repository
      shell: powershell
      run: |
        # Force UTF-8 encoding for git commands
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $OutputEncoding = [System.Text.Encoding]::UTF8

        # Configure git user
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Add version files
        git add manifests/manifest.chrome.json manifests/manifest.firefox.json updates.json
        
        # Commit and push if changed
        $status = git status --porcelain
        if ($status) {
            git commit -m "🔧 chore: автообновление версии в манифестах и updates.json [skip ci]"
            git push origin main
            Write-Host "Version changes successfully pushed to main branch"
        } else {
            Write-Host "No version changes detected"
        }
