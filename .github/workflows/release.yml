name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Run extension build script
      run: node build.js

    - name: Pack Chrome extension
      shell: powershell
      run: |
        Compress-Archive -Path dist/chrome/* -DestinationPath DAModerator-chrome.zip

    - name: Pack Firefox extension
      shell: powershell
      run: |
        Compress-Archive -Path dist/firefox/* -DestinationPath DAModerator-firefox.xpi

    - name: Download and Setup Ahk2Exe Compiler
      shell: powershell
      run: |
        # Скачиваем стабильный компилятор Ahk2Exe
        Invoke-WebRequest -Uri "https://github.com/AutoHotkey/Ahk2Exe/releases/download/Ahk2Exe1.1.37.02/Ahk2Exe1.1.37.02.zip" -OutFile "Ahk2Exe.zip"
        Expand-Archive -Path "Ahk2Exe.zip" -DestinationPath "Ahk2ExeCompiler"

    - name: Compile Universal AHK Script to EXE
      shell: powershell
      run: |
        # Компилируем универсальный скрипт с нашей иконкой
        .\Ahk2ExeCompiler\Ahk2Exe.exe /in "AHK/DAModerator.ahk" /out "DAModerator.exe" /icon "AHK/icon.ico"

    - name: Create GitHub Release and Upload Assets
      shell: powershell
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Используем GitHub CLI для создания релиза и загрузки 4 файлов
        gh release create $env:GITHUB_REF_NAME DAModerator-chrome.zip DAModerator-firefox.xpi AHK/DAModerator.ahk DAModerator.exe `
          --title "Релиз $env:GITHUB_REF_NAME" `
          --notes "Автоматический релиз версии $env:GITHUB_REF_NAME. Содержит готовые расширения для Chrome/Firefox и универсальный AHK-скрипт."
